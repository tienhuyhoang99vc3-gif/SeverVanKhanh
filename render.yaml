services:
  - type: web
    name: key-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --preload
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: OWNER_IPS
        sync: false
      - key: SECRET_KEY
        generateValue: true
